version: "3"

services:
  zep:
    image: ghcr.io/getzep/zep:latest
    command: ["--config", "/config.yaml"]
    ports:
      - "8000:8000"
    environment:
      # Provide an OpenAI key to enable embeddings/vector search (recommended for best accuracy).
      # If not set, Zep may still start but vector search can fail.
      - ZEP_OPENAI_API_KEY=${ZEP_OPENAI_API_KEY:-dummy-api-key}

      # Local embeddings via the Ollama container.
      - ZEP_EMBEDDINGS_API_URL=http://ollama:11434/api/embeddings
      - ZEP_EMBEDDINGS_MODEL=nomic-embed-text
    volumes:
      - ./config.yaml:/config.yaml:ro
    depends_on:
      - db
      - ollama

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zep
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"

